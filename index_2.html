<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnovationRL | Refactor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style_2.css">
</head>
<body>

    <section class="bloque bloque-1">
        <picture class="fondo-container">
            <source media="(max-width: 768px)" srcset="fondo-telefono/FONDO-1.webp">
            <img src="fondo/fondo-1.webp" alt="Fondo" class="img-full">
        </picture>

        <div class="contenido-capa">
            <img class="img-texto movil-only" src="text-telefono/TEXTO-1.webp" alt="Texto">
            <img class="img-texto pc-only" src="texto/TEXTO_01.webp" alt="Texto">

            <a href="https://pay.hotmart.com/..." class="btn-animado pos-btn-1">
                <img src="botones-telefono/BOTON-1.png" alt="Comprar">
            </a>
        </div>
    </section>

    <section class="bloque bloque-7">
        <picture class="fondo-container">
            <source media="(max-width: 768px)" srcset="fondo-telefono/FONDO-7.webp">
            <img src="fondo/fondo-7.webp" alt="Fondo" class="img-full">
        </picture>

        <div class="contenido-capa">
            <div class="swiper swiper-general">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="galleria/Capa-10.png"></div>
                    <div class="swiper-slide"><img src="galleria/Capa-9.png"></div>
                    </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.swiper-general', {
            loop: true,
            speed: 1200,
            autoplay: { delay: 1, disableOnInteraction: false },
            breakpoints: {
                320: { slidesPerView: 1.5, spaceBetween: 10 },
                768: { slidesPerView: 4, spaceBetween: 20 }
            }
        });
    </script>
</body>
</html>
